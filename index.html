<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Users</title>
</head>

<body>
    <!-- <h1>Users</h1>
    <ul id="userList"></ul>

    <h1>Posts</h1>
    <div id="postItems"></div>

    <h1>Albums</h1>
    <ul id="albumList"></ul> -->

    <h3>Employee management</h3>


    <div class="d-flex p-2">
        <button class="btn btn-success p-2" id="showForm"> + New Employee</button>
        <div class="input-group rounded w-50 ml-0 p-2">
            <input type="text" class="form-control rounded " placeholder="Search by name or department..."
                id=searchInput />
        </div>
    </div>

    <!-- ----ADD EMPLOYEE FORM---- -->
    <div class="d-none" id="addCard">
        <h3>Add New Employee</h3>
        <form id="addForm">
            <div class="mb-3 w-50">
                <label for="name" class="form-label">Name</label>
                <input type="text" id="nameInput" class="form-control" placeholder="Fullname" required>
            </div>
            <div class="mb-3 w-50">
                <label for="dept" class="form-label">Department</label>
                <input type="text" id="deptInput" class="form-control" placeholder="Department" required>
            </div>
            <div class="mb-3 w-50">
                <label for="salary" class="form-label">Salary (KES)</label>
                <input type="number" id="salaryInput" class="form-control" placeholder="e.g. 90000" required>
            </div>
            <!-- <div class="mb-3 w-50">
            <label for="active" class="form-label">Status</label>
            <select id="active" class="form-select">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
            </select>
        </div> -->
            <button type="submit" class="btn btn-success">Submit</button>
        </form>
    </div>

    <br>

    <H4>Employees</H4>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>NAME</th>
                <th>DEPT.</th>
                <th>SALARY</th>
                <th>ACTIVE</th>
            </tr>
        </thead>
        <tbody id="empTable">
        </tbody>
    </table>

    <!-- ----EDIT FORM----- -->
    <div class="card w-50 mb-4 d-none" id="editCard">
        <div class="class-header bg-warning">Edit Employee</div>
        <div class="card-body">
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label for="editname" class="form-label">Name</label>
                    <input type="text" id="editName" class="form-control" placeholder="Fullname" required>
                </div>
                <div class="mb-3">
                    <label for="editdept" class="form-label">Department</label>
                    <input type="text" id="editDept" class="form-control" placeholder="Department" required>
                </div>
                <div class="mb-3">
                    <label for="editsalary" class="form-label">Salary (KES)</label>
                    <input type="number" id="editSalary" class="form-control" placeholder="e.g. 90000" required>
                </div>
                <div class="mb-3">
                    <label for="editActive" class="form-label">Status</label>
                    <select id="editActive" class="form-select">
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>
                <div>
                    <button type="submit" class="btn btn-outline-primary">Save Changes</button>
                    <button type="button" id="cancelEdit" class="btn btn-outline-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
